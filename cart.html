<!doctype html>
<html lang="ru">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Корзина — ModelCars</title>
  <meta name="description" content="Корзина товаров: управление количеством, итоги, оформление.">
  <link rel="stylesheet" href="/assets/css/styles.css">
</head>
<body data-page="cart">
  <header class="site-header">
    <div class="container header-inner">
      <a href="/" class="brand"><div class="brand-logo">MC</div><div class="brand-name">ModelCars</div></a>
      <nav class="nav">
        <a href="/catalog.html">Каталог</a>
        <a href="/wishlist.html">Желаемое</a>
        <a href="/cart.html">Корзина</a>
      </nav>
      <div class="actions">
        <a class="icon-btn" href="/wishlist.html">♥ <span class="count" data-wishlist-count style="display:none">0</span></a>
        <a class="icon-btn" href="/cart.html">🛒 <span class="count" data-cart-count style="display:none">0</span></a>
      </div>
    </div>
  </header>

  <main class="container section">
    <h1>Корзина</h1>
    <div id="cart-empty" class="empty" style="display:none;">Ваша корзина пуста</div>
    <div id="cart-summary" class="grid" style="grid-template-columns: 1.3fr 1fr; gap: 16px; display:none;">
      <section>
        <table class="table">
          <thead>
            <tr><th>Товар</th><th>Цена</th><th>Кол-во</th><th>Сумма</th><th></th></tr>
          </thead>
          <tbody id="cart-body"></tbody>
        </table>
      </section>
      <aside class="summary">
        <div class="row"><span>Подытог</span><strong id="subtotal">0 ₽</strong></div>
        <div class="row"><span>Доставка</span><strong id="shipping">—</strong></div>
        <div class="row total"><span>Итого</span><strong id="total">0 ₽</strong></div>
        <div class="cta-row" style="margin-top:10px;">
          <a class="btn btn-primary" href="/checkout.html">Оформить заказ</a>
        </div>
      </aside>
    </div>
  </main>

  <footer class="site-footer">
    <div class="container footer-bottom">© <span id="year"></span> ModelCars</div>
  </footer>

  <script>document.getElementById('year').textContent = new Date().getFullYear();</script>
  <script src="/assets/js/app.js" defer></script>
</body>
</html>

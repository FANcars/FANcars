<!doctype html>
<html lang="ru">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Каталог — ModelCars</title>
  <meta name="description" content="Каталог коллекционных моделей автомобилей с фильтрами и поиском.">
  <link rel="stylesheet" href="/assets/css/styles.css">
</head>
<body data-page="catalog">
  <header class="site-header">
    <div class="container header-inner">
      <a href="/" class="brand"><div class="brand-logo">MC</div><div class="brand-name">ModelCars</div></a>
      <nav class="nav">
        <a href="/catalog.html">Каталог</a>
        <a href="/wishlist.html">Желаемое</a>
        <a href="/cart.html">Корзина</a>
      </nav>
      <div class="actions">
        <a class="icon-btn" href="/wishlist.html">♥ <span class="count" data-wishlist-count style="display:none">0</span></a>
        <a class="icon-btn" href="/cart.html">🛒 <span class="count" data-cart-count style="display:none">0</span></a>
      </div>
    </div>
  </header>

  <main class="container">
    <section class="section">
      <h1>Каталог</h1>
      <div class="filters">
        <input id="search" placeholder="Поиск по названию, бренду, цвету">
        <select id="filter-brand"></select>
        <select id="filter-scale"></select>
        <select id="filter-material"></select>
        <input id="price-min" type="number" placeholder="Цена от">
        <input id="price-max" type="number" placeholder="Цена до">
      </div>
      <div class="cta-row" style="margin-top:10px; align-items:center;">
        <div class="badge">Найдено: <span id="results-count">0</span></div>
        <div style="flex:1"></div>
        <label>Сортировка
          <select id="sort">
            <option value="featured">По популярности</option>
            <option value="price-asc">Дешевле</option>
            <option value="price-desc">Дороже</option>
            <option value="year-desc">Новее</option>
            <option value="year-asc">Старее</option>
          </select>
        </label>
      </div>
    </section>

    <section class="section">
      <div id="catalog-grid" class="grid products"></div>
      <div id="pager" class="cta-row" style="margin-top:16px;"></div>
    </section>
  </main>

  <footer class="site-footer">
    <div class="container footer-bottom">© <span id="year"></span> ModelCars</div>
  </footer>

  <script>document.getElementById('year').textContent = new Date().getFullYear();</script>
  <script src="/assets/js/app.js" defer></script>
</body>
</html>
